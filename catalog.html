<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Modern Products Catalog</h1>
    <nav>
      <a href="catalog.html" class="active">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>
  <div class="hero">
    <h2>Discover Innovative Tech & Lifestyle Products</h2>
    <p style="max-width:500px;margin:auto;">
      Explore our curated selection of gadgets, accessories, and smart lifestyle gear. Click any product for more details and specs!
    </p>
  </div>
  <div class="container">
    <div class="tools">
      <input type="text" id="searchInput" placeholder="Search…">
      <select id="sortBy">
        <option value="">Sort By</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="category">Category</option>
      </select>
    </div>
    <div class="catalog-grid" id="catalog"></div>
  </div>
  <footer>
    &copy; 2026 Modern Products Catalog &mdash; Built with GitHub Pages
  </footer>
  <script>
    let products = [];
    const catalog = document.getElementById('catalog');
    const searchInput = document.getElementById('searchInput');
    const sortBy = document.getElementById('sortBy');
    const fetchProducts = async () => {
      const resp = await fetch('products.json');
      products = await resp.json();
      render(products);
    };
    function render(list) {
      if (!list.length) {
        catalog.innerHTML = '<p>No products found.</p>';
        return;
      }
      catalog.innerHTML = list.map(prod => `
        <div class="product" onclick="viewProduct(${prod.id})" tabindex="0" role="button" title="View details">
          <img src="${prod.img}" alt="${prod.name}">
          <div class="name">${prod.name}</div>
          <div class="category">${prod.category}</div>
          <div class="price">USD ${prod.price.toFixed(2)}</div>
          <div class="short-desc">${prod.shortDesc}</div>
          <div class="tags">${prod.tags.join(', ')}</div>
        </div>
      `).join('');
    }
    function filterAndSort() {
      let value = searchInput.value.trim().toLowerCase();
      let list = products.filter(prod =>
        prod.name.toLowerCase().includes(value) ||
        prod.category.toLowerCase().includes(value) ||
        prod.tags.join(' ').toLowerCase().includes(value)
      );
      if (sortBy.value === 'price-asc') list.sort((a, b) => a.price - b.price);
      if (sortBy.value === 'price-desc') list.sort((a, b) => b.price - a.price);
      if (sortBy.value === 'category') list.sort((a, b) => a.category.localeCompare(b.category));
      render(list);
    }
    searchInput.addEventListener('input', filterAndSort);
    sortBy.addEventListener('change', filterAndSort);
    window.viewProduct = (id) => {
      localStorage.setItem('selectedProductId', id);
      window.location.href = 'product-details.html';
    };
    fetchProducts();
  </script>
</body>
</html>
